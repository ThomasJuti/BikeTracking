<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi motocicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container py-4 py-md-5">
      <header class="hero card border-0 shadow-lg mb-4">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
            <div>
              <p class="text-uppercase fw-semibold mb-2 tracking">BikeTracking</p>
              <h1 class="display-6 fw-bold mb-2">Mi motocicleta</h1>
              <p class="text-muted m-0">
                Manten actualizados los datos principales de tu vehiculo personal.
              </p>
            </div>
            <div class="d-flex align-items-start gap-2">
              <a href="/home.html" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left"></i>
                Inicio
              </a>
              <button class="btn btn-primary btn-lg" id="btnNueva">
                <i class="bi bi-plus-lg"></i>
                Registrar mi moto
              </button>
              <div class="theme-switcher">
                <button class="theme-dot" data-theme="dark" title="Oscuro"></button>
                <button class="theme-dot" data-theme="light" title="Claro"></button>
                <button class="theme-dot" data-theme="esmeralda" title="Esmeralda"></button>
              </div>
              <button class="btn btn-outline-danger btn-lg" id="btnLogout">
                <i class="bi bi-box-arrow-right"></i> Salir
              </button>
            </div>
          </div>
        </div>
      </header>

      <section class="row g-3 mb-3" id="stats"></section>

      <section class="card border-0 shadow-sm">
        <div class="card-body p-3 p-md-4">
          <p class="text-muted mb-3">
            Esta vista funciona como la ficha principal de tu moto. Aqui concentras sus datos basicos y puedes mantenerlos al dia.
          </p>

          <div id="alerta" class="alert d-none" role="alert"></div>

          <div id="vehicleProfile"></div>
        </div>
      </section>
    </main>

    <div class="modal fade" id="motoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <form class="modal-content" id="formMoto">
          <div class="modal-header border-0">
            <h5 class="modal-title" id="modalTitulo">Registrar mi motocicleta</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body pt-0">
            <input type="hidden" id="motoId" />
            <div class="row g-3">
              <div class="col-md-4">
                <label for="placa" class="form-label">Placa</label>
                <input id="placa" class="form-control" maxlength="10" required />
              </div>
              <div class="col-md-4">
                <label for="marca" class="form-label">Marca</label>
                <input id="marca" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label for="modelo" class="form-label">Modelo</label>
                <input id="modelo" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label for="anio" class="form-label">Anio</label>
                <input id="anio" type="number" min="1900" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label for="cilindraje" class="form-label">Cilindraje</label>
                <input id="cilindraje" class="form-control" placeholder="Ej. 150cc" required />
              </div>
              <div class="col-md-4">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" class="form-select" required>
                  <option value="activa">Activa</option>
                  <option value="mantenimiento">Mantenimiento</option>
                  <option value="inactiva">Inactiva</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="relieve" class="form-label">Relieve</label>
                <select id="relieve" class="form-select" required>
                  <option value="bajo">Bajo — Ciudad / asfalto</option>
                  <option value="medio">Medio — Mixto</option>
                  <option value="alto">Alto — Montana / offroad</option>
                </select>
              </div>
              <div class="col-12">
                <label for="propietario" class="form-label">Propietario</label>
                <input id="propietario" class="form-control" required />
              </div>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button class="btn btn-light" type="button" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-floppy2"></i>
              Guardar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
