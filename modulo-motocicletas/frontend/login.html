<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BikeTracking — Acceder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div class="theme-switcher theme-float">
      <button class="theme-dot" data-theme="dark" title="Oscuro"></button>
      <button class="theme-dot" data-theme="light" title="Claro"></button>
      <button class="theme-dot" data-theme="esmeralda" title="Esmeralda"></button>
    </div>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

          <!-- Logo / Brand -->
          <div class="text-center mb-4">
            <div class="login-brand-icon mx-auto mb-3">
              <i class="bi bi-bicycle fs-1"></i>
            </div>
            <p class="text-uppercase fw-semibold tracking mb-1">BikeTracking</p>
            <h1 class="fs-3 fw-bold mb-0">Seguimiento personal</h1>
            <p class="text-muted small mt-1">Inicia sesion o crea tu cuenta para continuar.</p>
          </div>

          <!-- Alert global -->
          <div id="alerta" class="alert d-none mb-3" role="alert"></div>

          <!-- Card con tabs -->
          <div class="card border-0 shadow-lg">
            <div class="card-body p-4 p-md-5">

              <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
                <li class="nav-item">
                  <button class="nav-link active fw-semibold" id="tabLogin" type="button">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesion
                  </button>
                </li>
                <li class="nav-item">
                  <button class="nav-link fw-semibold" id="tabRegister" type="button">
                    <i class="bi bi-person-plus me-1"></i> Registrarse
                  </button>
                </li>
              </ul>

              <!-- Formulario Login -->
              <form id="formLogin" novalidate>
                <div class="mb-3">
                  <label for="loginUsername" class="form-label fw-semibold">Usuario</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-person"></i>
                    </span>
                    <input
                      id="loginUsername"
                      type="text"
                      class="form-control border-start-0 ps-0"
                      placeholder="Tu nombre de usuario"
                      autocomplete="username"
                      required
                    />
                    <div class="invalid-feedback">El usuario es obligatorio.</div>
                  </div>
                </div>
                <div class="mb-4">
                  <label for="loginPassword" class="form-label fw-semibold">Contrasena</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input
                      id="loginPassword"
                      type="password"
                      class="form-control border-start-0 ps-0"
                      placeholder="Tu contrasena"
                      autocomplete="current-password"
                      required
                    />
                    <div class="invalid-feedback">La contrasena es obligatoria.</div>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold" id="btnLogin">
                  <span class="spinner-border spinner-border-sm me-2 d-none" id="spinLogin"></span>
                  <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesion
                </button>
              </form>

              <!-- Formulario Registro -->
              <form id="formRegister" novalidate class="d-none">
                <div class="mb-3">
                  <label for="regUsername" class="form-label fw-semibold">Usuario</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-person"></i>
                    </span>
                    <input
                      id="regUsername"
                      type="text"
                      class="form-control border-start-0 ps-0"
                      placeholder="Minimo 3 caracteres"
                      autocomplete="username"
                      required
                      minlength="3"
                    />
                    <div class="invalid-feedback">Minimo 3 caracteres.</div>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="regPassword" class="form-label fw-semibold">Contrasena</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input
                      id="regPassword"
                      type="password"
                      class="form-control border-start-0 ps-0"
                      placeholder="Minimo 6 caracteres"
                      autocomplete="new-password"
                      required
                      minlength="6"
                    />
                    <div class="invalid-feedback">Minimo 6 caracteres.</div>
                  </div>
                </div>
                <div class="mb-4">
                  <label for="regPassword2" class="form-label fw-semibold">Confirmar contrasena</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-lock-fill"></i>
                    </span>
                    <input
                      id="regPasswordConfirm"
                      type="password"
                      class="form-control border-start-0 ps-0"
                      placeholder="Repite tu contrasena"
                      autocomplete="new-password"
                      required
                    />
                    <div class="invalid-feedback">Las contrasenas no coinciden.</div>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold" id="btnRegister">
                  <span class="spinner-border spinner-border-sm me-2 d-none" id="spinRegister"></span>
                  <i class="bi bi-person-plus me-1"></i> Crear cuenta
                </button>
              </form>

            </div>
          </div>

        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
  </body>
</html>
